name: Build and Push to Deploy Branch

on:
  push:
    branches:
      - main # Ou a branch principal que o Lovable usa

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Push to hostinger-deploy branch
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: hostinger-deploy # Hostinger vai ler desta branch
          FOLDER: dist # Pasta gerada pelo build
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
